<style>
  :root{
    --green:#2e7d32;
    --green-d:#1b5e20;
    --green-l:#e8f3e9;
    --bg:#f6f4ee;
    --card:#ffffff;
    --ink:#22302a;
    --muted:#6b7a72;
    --line:#e3e0d6;
    --warn:#b3541e;
    --gold:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:Georgia,"Times New Roman",serif;letter-spacing:.2px}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .side{
    width:230px;background:linear-gradient(180deg,var(--green-d),var(--green));
    color:#eaf3ea;padding:18px 0;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;
  }
  .side .logo-wrap{padding:0 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.18)}
  .side .logo-wrap img{width:42px;height:42px;object-fit:contain;border-radius:8px;background:#fff;padding:3px}
  .side .brand{font-size:20px;color:#fff;line-height:1.1}
  .side .brand small{display:block;font-size:11px;font-family:inherit;opacity:.8;font-weight:normal;letter-spacing:1px}
  nav{margin-top:10px}
  nav button{
    display:flex;align-items:center;gap:11px;width:100%;border:0;background:none;color:#dcebdc;
    padding:12px 18px;font-size:14.5px;cursor:pointer;text-align:left;border-left:3px solid transparent;
  }
  nav button:hover{background:rgba(255,255,255,.08)}
  nav button.active{background:rgba(255,255,255,.16);border-left-color:#fff;color:#fff;font-weight:600}
  nav .ic{font-size:17px;width:20px;text-align:center}
  /* Main */
  .main{margin-left:230px;flex:1;padding:26px 30px 60px;width:calc(100% - 230px)}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px}
  .topbar h1{font-size:27px;color:var(--green-d)}
  .topbar p{color:var(--muted);font-size:13.5px;margin-top:3px}
  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(40,50,40,.04)}
  .grid{display:grid;gap:16px}
  .stat{display:flex;flex-direction:column;gap:4px}
  .stat .v{font-size:28px;font-weight:700;font-family:Georgia,serif;color:var(--green-d)}
  .stat .l{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  /* Buttons */
  .btn{border:0;border-radius:9px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:var(--green);color:#fff}
  .btn.primary:hover{background:var(--green-d)}
  .btn.ghost{background:var(--green-l);color:var(--green-d)}
  .btn.ghost:hover{background:#d9ebdb}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:#fbeaea;color:#b3261e}
  .btn.danger:hover{background:#f6d6d6}
  /* Table */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 10px;font-size:13.5px;border-bottom:1px solid var(--line)}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
  tr:last-child td{border-bottom:0}
  /* Badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  .b-green{background:var(--green-l);color:var(--green-d)}
  .b-amber{background:#fdf0d9;color:#9a6b00}
  .b-red{background:#fbeaea;color:#b3261e}
  .b-blue{background:#e4eef8;color:#23618f}
  .b-grey{background:#eee;color:#555}
  /* Forms */
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px}
  input,select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;
    font-family:inherit;background:#fff;color:var(--ink)
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--green-l);border-color:var(--green)}
  textarea{resize:vertical;min-height:64px}
  .field{margin-bottom:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,30,22,.45);display:flex;align-items:flex-start;justify-content:center;padding:34px 14px;z-index:50;overflow-y:auto}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:620px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .modal h2{font-size:21px;color:var(--green-d);margin-bottom:16px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .close-x{float:right;cursor:pointer;font-size:22px;color:var(--muted);border:0;background:none;line-height:1}
  /* Banner */
  .banner{padding:13px 18px;border-radius:11px;margin-bottom:18px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start}
  .banner.err{background:#fbeaea;color:#8a2018;border:1px solid #f1c9c4}
  .banner.ok{background:var(--green-l);color:var(--green-d);border:1px solid #cfe6d1}
  .stars{color:var(--gold);letter-spacing:2px;font-size:16px}
  .muted{color:var(--muted)}
  .pill-cat{font-size:11px;padding:2px 9px;border-radius:6px;background:#eef1ec;color:#5a6b5d;font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
  .addon-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
  .calc-box{background:var(--green-l);border-radius:11px;padding:14px 16px;margin-top:6px}
  .calc-line{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
  .calc-total{display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:var(--green-d);border-top:1px dashed #b8d4bb;margin-top:7px;padding-top:8px;font-family:Georgia,serif}
  .mobile-top{display:none}
  /* Mobile */
  @media (max-width:820px){
    .side{transform:translateX(-100%);transition:.25s;z-index:60;width:250px;box-shadow:4px 0 20px rgba(0,0,0,.2)}
    .side.open{transform:translateX(0)}
    .main{margin-left:0;width:100%;padding:14px 14px 70px}
    .mobile-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .hamb{font-size:26px;background:none;border:0;color:var(--green-d);cursor:pointer}
    .row2,.row3{grid-template-columns:1fr}
    .topbar h1{font-size:22px}
    .scroll-x{overflow-x:auto}
    table{min-width:540px}
  }
  /* Print */
  .print-area{display:none}
  @media print{
    .side,.topbar,.btn,.no-print,.mobile-top,nav{display:none !important}
    .main{margin:0;width:100%;padding:0}
    body{background:#fff}
    .print-area{display:block}
    .screen-area{display:none}
  }
</style>
</head>

<div id="root">
  <div id="boot-msg" style="padding:50px 30px;text-align:center;font-family:Georgia,serif;color:#2e7d32;max-width:560px;margin:0 auto">
    <h1 style="font-size:34px;margin-bottom:8px">🌿 GardenSpa</h1>
    <p style="color:#5a6b5d;margin:0 0 18px;font-family:sans-serif">Ładowanie aplikacji…</p>
    <p id="boot-err" style="display:none;background:#fbeaea;color:#8a2018;padding:14px 18px;border-radius:10px;font-family:sans-serif;font-size:13px;text-align:left;border:1px solid #f1c9c4"></p>
  </div>
</div>
<script>
  // jeśli po 6 sekundach nic się nie zarenderowało, pokaż wskazówkę
  setTimeout(function(){
    var rt = document.getElementById('root');
    if(rt && rt.firstElementChild && rt.firstElementChild.id === 'boot-msg'){
      var e = document.getElementById('boot-err');
      if(e){ e.style.display='block';
        e.innerHTML = '<b>Aplikacja nie załadowała się w 6 sekund.</b><br/>Najczęściej oznacza to, że Twoja sieć/antywirus blokuje pobranie bibliotek z <code>unpkg.com</code>. Wyłącz na chwilę osłonę sieciową w antywirusie i odśwież stronę (Ctrl+Shift+R). Jeśli to nie pomaga, naciśnij F12 → zakładka „Console" i prześlij screen do wsparcia.';
      }
    }
  }, 6000);
  window.addEventListener('error', function(ev){
    var e = document.getElementById('boot-err');
    if(e){ e.style.display='block';
      e.innerHTML = '<b>Błąd ładowania:</b> ' + (ev.message||'nieznany') + (ev.filename?'<br/><small>'+ev.filename+'</small>':'');
    }
  });
</script>
<script>
const {
  useState,
  useEffect,
  useMemo,
  useCallback
} = React;

/* ============ KONFIGURACJA SUPABASE ============ */
const SUPABASE_URL = "https://vgnkrgrmdauwzugskxsc.supabase.co";
const SUPABASE_KEY = "sb_publishable_o_gCTwEbzh2WAen3toyM6A_ttk4i95B";
/* ============ SESJA / LOGOWANIE ============ */
let authSession = null;
function loadSession() {
  try {
    const s = localStorage.getItem("gardenspa_session");
    if (s) authSession = JSON.parse(s);
  } catch (_) {}
}
function saveSession(s) {
  authSession = s;
  try {
    localStorage.setItem("gardenspa_session", JSON.stringify(s));
  } catch (_) {}
}
function clearSession() {
  authSession = null;
  try {
    localStorage.removeItem("gardenspa_session");
  } catch (_) {}
}
function currentUserEmail() {
  return authSession && authSession.user ? authSession.user.email : "";
}
function authHeaders() {
  const token = authSession && authSession.access_token ? authSession.access_token : SUPABASE_KEY;
  return {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + token,
    "Content-Type": "application/json"
  };
}
async function signIn(email, password) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error_description || data.msg || data.error || "Błędny e-mail lub hasło");
  saveSession({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    user: data.user
  });
  return data;
}
async function refreshSession() {
  if (!authSession || !authSession.refresh_token) throw new Error("brak sesji");
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      refresh_token: authSession.refresh_token
    })
  });
  if (!r.ok) {
    clearSession();
    throw new Error("sesja wygasła");
  }
  const data = await r.json();
  saveSession({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    user: data.user
  });
  return data;
}
function signOut() {
  clearSession();
  location.reload();
}
async function sendPasswordReset(email) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email
    })
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error_description || data.msg || data.error || "Nie udało się wysłać e-maila");
  return true;
}
async function updatePassword(token, newPassword) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    method: "PUT",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      password: newPassword
    })
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error_description || data.msg || data.error || "Nie udało się zmienić hasła");
  return data;
}
function parseRecoveryHash() {
  try {
    const hash = (window.location.hash || "").replace(/^#/, "");
    if (!hash) return null;
    const params = new URLSearchParams(hash);
    if (params.get("type") === "recovery" && params.get("access_token")) {
      return {
        token: params.get("access_token")
      };
    }
  } catch (_) {}
  return null;
}

/* ============ DOSTĘP DO BAZY ============ */
async function sbRaw(path, opts = {}) {
  const userHeaders = opts.headers || {};
  const send = () => fetch(`${SUPABASE_URL}${path}`, {
    ...opts,
    headers: Object.assign({}, userHeaders, authHeaders())
  });
  let r = await send();
  if (r.status === 401 && authSession && authSession.refresh_token) {
    try {
      await refreshSession();
      r = await send();
    } catch (_) {}
  }
  return r;
}
async function sbGet(table, query = "") {
  const r = await sbRaw(`/rest/v1/${table}?${query}`);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, row) {
  const r = await sbRaw(`/rest/v1/${table}`, {
    method: "POST",
    headers: {
      "Prefer": "return=representation"
    },
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, idCol, idVal, patch) {
  const r = await sbRaw(`/rest/v1/${table}?${idCol}=eq.${idVal}`, {
    method: "PATCH",
    headers: {
      "Prefer": "return=representation"
    },
    body: JSON.stringify(patch)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, idVal) {
  const r = await sbRaw(`/rest/v1/${table}?id=eq.${idVal}`, {
    method: "DELETE"
  });
  if (!r.ok) throw new Error(await r.text());
}

/* ============ POMOCNICZE ============ */
const CATS = {
  balia: "Balia",
  sauna: "Sauna",
  podnosnik: "Podnośnik koszowy",
  ogrod: "Sprzęt ogrodowy"
};
const fmtPLN = n => (Number(n) || 0).toLocaleString("pl-PL", {
  minimumFractionDigits: 2,
  maximumFractionDigits: 2
}) + " zł";
function fmtDate(s) {
  if (!s) return "—";
